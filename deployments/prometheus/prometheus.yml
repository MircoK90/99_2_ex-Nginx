global:
  scrape_interval: 10s      # data scraping interval, grafana seams to adapt to that

scrape_configs:
  - job_name: 'nginx-exporter'
    static_configs:
    - targets: ['nginx_exporter:9113']      #9113 seams stnadnard adress for nginx exporter

  - job_name: 'prometheus'
    static_configs:
      - targets: [localhost:9090]

